# Judge Configuration
# Primary metric judges and the SS auditor use GPT-5.4-mini. The paper reports
# a separate judge-coupling validation because GPT-5.4-mini is also one AUT.
judge:
  primary:
    provider: openrouter
    model_id: openai/gpt-5.4-mini
    temperature: 0.0
    max_tokens: 2048
  ss_auditor:
    provider: openrouter
    model_id: openai/gpt-5.4-mini
    temperature: 0.0
    max_tokens: 2048
