- query_id: finance_08
  domain: finance
  query: "Should I prioritize paying off debt or investing for retirement?"
  gold_answer: "Financial advisors recommend a balanced approach. High-interest debt (credit cards at 15%+) should be paid aggressively before investing. For lower-interest debt (student loans at 5-7%, mortgages at 3-5%), contributing to employer 401(k) to capture matching is prioritized, then additional payments toward debt. Tax-advantaged retirement account contributions often provide immediate 25-50% returns through employer matching, justifying concurrent debt reduction. Consult a financial advisor for personal circumstances."
