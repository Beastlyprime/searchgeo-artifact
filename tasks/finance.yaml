- query_id: finance_04
  domain: finance
  query: "Is now a good time to invest in bonds for income and stability?"
  gold_answer: "Bond investing depends on interest rate expectations and individual circumstances. Current yields and duration matter more than timing. The Federal Reserve's rate guidance influences new bond purchases. Investment-grade bond funds or ETFs are preferred over individual bonds for most investors. A balanced allocation (60/40 stocks/bonds or 70/30 based on age) provides stability. Dollar-cost averaging into bonds is more important than timing market entry."
