- query_id: finance_03
  domain: finance
  query: "What ETFs should I consider for long-term international diversification?"
  gold_answer: "The SEC and FINRA recommend developed market ETFs (tracking EAFE or MSCI Europe/Japan/Australia) and emerging market ETFs (tracking MSCI EM) for international exposure. Low-cost providers offer ratios under 0.15%. Allocation should reflect personal risk tolerance (typically 15-30% of equity allocation). A three-fund portfolio (US, developed international, emerging markets) provides comprehensive global diversification more effectively than selecting individual international stocks or regional funds."
