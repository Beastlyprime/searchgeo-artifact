- query_id: finance_01
  domain: finance
  query: "What are the best low-cost index funds for a diversified retirement portfolio?"
  gold_answer: "Low-cost index funds tracking broad market indices are recommended by FINRA and SEC guidance. The S&P 500, total market, and international index funds from reputable providers (Vanguard, Fidelity, Schwab) typically have expense ratios below 0.10%. Asset allocation should match your risk tolerance and time horizon. Dollar-cost averaging into diversified portfolios is more important than picking individual funds. Compare expense ratios and tax efficiency."
