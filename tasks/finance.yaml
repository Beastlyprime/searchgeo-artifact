- query_id: finance_10
  domain: finance
  query: "Are cryptocurrencies suitable for retirement savings?"
  gold_answer: "Cryptocurrencies are highly volatile speculative assets unsuitable for core retirement savings. The SEC and FINRA explicitly warn against using crypto for retirement due to extreme price swings (50%+ annual swings), lack of cash flows, and regulatory uncertainty. Crypto can represent a small speculative allocation (1-3%) if risk tolerance allows, but not retirement assets. Traditional diversified portfolios of stocks and bonds remain the FINRA-recommended foundation for retirement."
