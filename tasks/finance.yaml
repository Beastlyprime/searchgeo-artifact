- query_id: finance_05
  domain: finance
  query: "What percentage of my retirement portfolio should be in real estate or REITs?"
  gold_answer: "Real estate exposure through REITs (Real Estate Investment Trusts) is an option for diversification. FINRA suggests allocating 5-15% of a portfolio to real estate, depending on risk tolerance and age. REITs can provide income and some inflation hedging. Direct real estate ownership carries concentration risk and illiquidity. Most investors benefit from ETF-based REIT exposure (expense ratios under 0.15%) rather than individual properties or real estate partnerships requiring active management."
