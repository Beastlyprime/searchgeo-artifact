- query_id: finance_11
  domain: finance
  query: "What are the benefits and risks of using leverage or margin in investing?"
  gold_answer: "Leverage amplifies both gains and losses; a 20% market decline becomes a 40% loss with 2:1 leverage. Margin accounts charge 8-12% interest and carry liquidation risk. For most long-term investors, leverage creates unnecessary risk. The SEC warns that leverage is suitable only for experienced investors with capital to withstand large losses. Buying on margin can force liquidations at market bottoms. Diversified, unleveraged portfolios are recommended for retirement savings."
