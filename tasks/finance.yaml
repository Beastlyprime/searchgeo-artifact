- query_id: finance_09
  domain: finance
  query: "What are robo-advisors and should I consider them for portfolio management?"
  gold_answer: "Robo-advisors use algorithms to create diversified portfolios based on risk tolerance and goals. Major platforms such as Vanguard, Fidelity, and Schwab typically charge about 0.25-0.50% annually, which is significantly less than traditional advisors charging around 1% or more. They can provide automatic rebalancing and tax-loss harvesting. They are best suited for hands-off investors with relatively straightforward planning needs. For complex situations such as estate, tax, or inheritance planning, human advisors may provide value. Fee transparency matters because embedded costs can compound over time."
