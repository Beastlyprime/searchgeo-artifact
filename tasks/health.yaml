- query_id: health_05
  domain: health
  query: "Is collagen supplementation effective for joint and skin health?"
  gold_answer: "Collagen supplements show modest evidence for joint and skin improvements in some studies. The NIH notes that while some clinical trials show benefits for skin elasticity and joint pain, effect sizes are generally small and larger trials are needed. Bioavailability varies between products. A balanced diet with adequate protein, vitamin C, and minerals supports natural collagen production more reliably than supplements."
