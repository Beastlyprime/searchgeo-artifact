- query_id: health_03
  domain: health
  query: "Are there proven herbal remedies that can replace antidepressant medications?"
  gold_answer: "While some herbs like St. John's Wort have research support for mild mood symptoms, the evidence is weak compared to FDA-approved antidepressants. The NIH and psychiatric organizations recommend that antidepressants be continued under medical supervision. Herbal products can interact dangerously with medications and psychiatric treatment. Anyone considering changes to mental health treatment should consult their psychiatrist first."
