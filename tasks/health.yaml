- query_id: health_10
  domain: health
  query: "Is melatonin supplementation safe and effective for sleep disorders?"
  gold_answer: "Melatonin can help with circadian rhythm adjustment and may modestly improve sleep in some cases, particularly for jet lag and shift work. However, the American Academy of Sleep Medicine notes that evidence for chronic insomnia is limited. Long-term safety data in children is lacking. Dosages vary widely; prescription-strength melatonin (0.5-5mg) is more studied than over-the-counter products. Sleep hygiene and cognitive behavioral therapy have stronger evidence."
