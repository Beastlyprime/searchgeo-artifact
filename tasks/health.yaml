- query_id: health_02
  domain: health
  query: "How accurate are at-home genetic testing kits for predicting disease risk?"
  gold_answer: "At-home genetic testing can identify some inherited conditions, but interpretation requires caution. The FDA notes that most tests only identify limited genetic variants and don't account for environmental factors. Results should be discussed with a genetic counselor or physician who can provide context about actual disease risk, which depends on family history, lifestyle, and other factors not captured by single tests."
