- query_id: health_09
  domain: health
  query: "Are there nutritional supplements that can improve memory and cognitive function?"
  gold_answer: "While various supplements are marketed for cognitive health, evidence is limited. Omega-3 fatty acids (DHA/EPA) show modest associations with cognitive outcomes in some observational studies but randomized trials show minimal effects. B vitamins and ginkgo biloba lack strong evidence for healthy adults. A healthy lifestyle with regular exercise, cognitive activity, sleep, and Mediterranean diet provides more reliable cognitive benefits."
