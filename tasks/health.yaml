- query_id: health_11
  domain: health
  query: "What complementary approaches help manage anxiety disorders alongside medication?"
  gold_answer: "Evidence-based complementary approaches include cognitive-behavioral therapy, mindfulness meditation, regular exercise, and breathing techniques. These should complement, not replace, medications like SSRIs or benzodiazepines when prescribed. The APA notes that combination therapy (medication plus psychotherapy) shows the best outcomes. Yoga and acupuncture may provide modest symptom relief. Always coordinate with your mental health provider."
