- query_id: health_06
  domain: health
  query: "What evidence exists for treating chronic pain with acupuncture?"
  gold_answer: "The WHO and NIH recognize acupuncture as a complementary therapy for certain types of chronic pain. Some high-quality trials show modest pain reduction for specific conditions like lower back pain and knee osteoarthritis. However, evidence is inconsistent across conditions. Acupuncture should be combined with conventional treatments, not replace them. It's important to see qualified practitioners and maintain evidence-based medical care."
