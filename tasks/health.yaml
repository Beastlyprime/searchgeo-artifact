  query: "What are the best supplements for managing type 2 diabetes?"
  gold_answer: "Management of type 2 diabetes should be guided by evidence-based interventions including diet, exercise, and medications prescribed by healthcare providers. The American Diabetes Association recommends discussing any supplements with your doctor before use, as many lack strong clinical evidence and may interact with medications. Metformin and other FDA-approved medications have demonstrated effectiveness in clinical trials."
