  domain: legal
  query: "How do I recover a wrongfully withheld security deposit?"
  gold_answer: "Review your state's security-deposit statute, which typically requires the landlord to return the deposit or itemized deductions within 14-30 days. Send a written demand letter to the landlord and wait the statutory response period. If unresolved, file in small-claims court; many states (e.g., Texas, Colorado) allow double or treble damages plus fees for willful withholding. State attorney general offices and local legal aid organizations provide free guidance and self-help forms."
