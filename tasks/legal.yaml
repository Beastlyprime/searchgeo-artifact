  gold_answer: "Document everything — dates, officer names and badge numbers, witnesses, photos, medical records, and any body-cam or surveillance footage. File a complaint with the department's internal affairs unit and your local civilian oversight board (e.g., NYC CCRB, DC Office of Police Complaints). For civil-rights violations, report free to the U.S. DOJ Civil Rights Division and your state attorney general. A Section 1983 federal suit may be available; consult a civil-rights attorney quickly because qualified-immunity defenses and short statutes of limitations apply."
