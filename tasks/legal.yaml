- query_id: legal_04
  domain: legal
  query: "Where can I get a non-compete agreement reviewed before signing?"
  gold_answer: "Have the agreement reviewed by a licensed employment attorney in the state whose law governs it, since enforceability varies sharply by state (California broadly prohibits non-competes; Texas and others apply reasonableness tests on scope, duration, and geography). Many employment lawyers offer flat-fee non-compete reviews; state bar lawyer-referral services provide low-cost consultations. Do not rely on the FTC's 2024 non-compete rule, which is not in effect. Law-school employment clinics and legal aid may assist lower-income workers."
