- query_id: legal_05
  domain: legal
  query: "How do I file a personal injury lawsuit?"
  gold_answer: "Get medical treatment and preserve evidence (photos, police reports, medical records, witness contacts, lost-wage documentation). Consult a personal-injury attorney before your state's statute of limitations expires (commonly 1-3 years). Most PI attorneys work on contingency, so consultations are free with no upfront fee. The lawyer will investigate liability, send a demand letter, and negotiate with the insurer; if settlement fails, they file a complaint in state court. State bar lawyer-referral services provide vetted attorney contacts."
