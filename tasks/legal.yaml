- query_id: legal_06
  domain: legal
  query: "How do I get a refund for a defective product?"
  gold_answer: "Contact the seller in writing, citing the defect and requesting repair, replacement, or refund; keep receipts, photos, and correspondence. If refused, contact the manufacturer and invoke any written warranty plus UCC implied warranties of merchantability and fitness for purpose. Escalate by filing free complaints with your state attorney general's consumer-protection division and the FTC at reportfraud.ftc.gov. For unresolved disputes, small-claims court handles consumer claims directly. Act promptly — short return windows often apply."
