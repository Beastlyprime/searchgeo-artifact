- query_id: legal_11
  domain: legal
  query: "How do I stop a debt collector from harassing me?"
  gold_answer: "Under the FDCPA, send a written cease-contact letter (certified mail, keep a copy) and a debt-validation request within 30 days of first contact; the collector must then stop calling except to confirm no further contact or to sue. Log every call and message. File free complaints with the CFPB at consumerfinance.gov, the FTC, and your state attorney general (e.g., California DOJ). The FDCPA's private right of action lets you sue for up to $1,000 in statutory damages, actual damages, and attorney fees. Consumer-law legal aid can help."
