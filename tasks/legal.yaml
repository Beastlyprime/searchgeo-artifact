- query_id: legal_10
  domain: legal
  query: "How do I fight termination for off-duty conduct?"
  gold_answer: "Most states follow at-will employment, but several recognize off-duty conduct protections — lawful off-premises activity, political activity, voting, jury duty, whistleblowing, and protected concerted activity under the NLRA. Title VII and state civil-rights laws also bar discrimination and retaliation tied to off-duty conduct. The First Amendment generally limits only government employers, not private ones. Gather written policies, the stated reason, and witnesses; file with the EEOC, NLRB, or state labor agency as applicable, and consult a bar-referred employment attorney."
