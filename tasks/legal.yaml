- query_id: legal_09
  domain: legal
  query: "How do I recover wages for unauthorized or scope-creep work?"
  gold_answer: "Under the FLSA, employers must pay for all hours worked, including off-the-clock and unauthorized overtime — approval status does not affect the obligation. Keep contemporaneous records of actual hours, tasks, and any directives expanding your scope. File a free complaint with the U.S. Department of Labor's Wage and Hour Division, or with your state labor board for parallel state-law claims. Recoverable remedies include back wages, liquidated damages, and attorney fees. Raise misclassification (exempt vs. nonexempt) issues if applicable. A wage-and-hour attorney can advise."
