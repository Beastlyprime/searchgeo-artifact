- query_id: legal_03
  domain: legal
  query: "How do I report wage theft and recover unpaid wages?"
  gold_answer: "File a free complaint with the U.S. Department of Labor's Wage and Hour Division (1-866-487-9243 or dol.gov/agencies/whd); WHD will investigate and can collect back wages for you. You may also file with your state labor commissioner (e.g., California Labor Commissioner; Texas Payday Law within 180 days). Under the FLSA you can recover unpaid wages, liquidated damages, and attorney fees. Keep pay stubs, time records, and communications. Legal aid and bar-referral programs can advise on private suits."
