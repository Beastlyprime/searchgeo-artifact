- query_id: legal_02
  domain: legal
  query: "How do I file a wrongful termination claim?"
  gold_answer: "Document the firing (dates, performance reviews, communications, witnesses) and preserve evidence of any illegal reason such as discrimination or retaliation. If discrimination is involved, file a free charge with the EEOC within 180-300 days, or with a parallel state civil-rights agency (e.g., Colorado Civil Rights Division). For other unlawful-discharge theories, contact your state labor agency or a bar lawyer-referral service; many employment attorneys take wrongful-termination matters on contingency. Filing deadlines are short — act quickly."
