- query_id: legal_07
  domain: legal
  query: "How can I defend against an eviction notice?"
  gold_answer: "Do not move out immediately — landlords must serve proper written notice (e.g., a 3-day pay-or-quit) and obtain a court judgment before any lawful eviction. Read the notice carefully and respond by the court's deadline; file an Answer (such as California form UD-105) raising defenses like improper notice, habitability issues, retaliation, discrimination, or accepted partial rent. Contact local legal aid, tenant clinics, and housing-court self-help centers, which are free. Bring your lease, payment records, and photos to every hearing."
